input AddCartItemInput {
  user_id: ID!
  restaurant_product_id: ID!
  quantity: Int!
  option_ids: [ID!] = []
}

input UpdateCartItemInput {
  user_id: ID!
  quantity: Int!
  option_ids: [ID!]
}

extend type Query {
  getCartByUserId(user_id: ID!): Cart
    @field(resolver: "App\\GraphQL\\Queries\\CartQueries@getCartByUserId")
  getCartByUserIdAndCartId(user_id: ID!, cart_id: ID!): Cart
    @field(resolver: "App\\GraphQL\\Queries\\CartQueries@getCartByUserIdAndCartId")
}

extend type Mutation {
  getCartByUserId(user_id: ID!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\CartMutations@getCartByUserId")
  addCartItem(input: AddCartItemInput!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\CartMutations@addCartItem")
  updateCartItem(cart_item_id: ID!, input: UpdateCartItemInput!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\CartMutations@updateCartItem")
  removeCartItem(user_id: ID!, cart_item_id: ID!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\CartMutations@removeCartItem")
  clearCart(user_id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\CartMutations@clearCart")
}
