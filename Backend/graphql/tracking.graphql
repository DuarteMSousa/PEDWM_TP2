type OrderTracking {
  order: Order!
  delivery: Delivery
  courier: Courier
  last_position: CourierPosition
  eta_seconds: Int
}

type DeliveryTracking {
  delivery: Delivery!
  last_position: CourierPosition
  eta_seconds: Int
}

input UpdateCourierLocationInput {
  courier_id: ID!
  delivery_id: ID!
  latitude: Float!
  longitude: Float!
  heading: Float
  speed: Float
  accuracy: Float
  recorded_at: String
}

type UpdateCourierLocationPayload {
  ok: Boolean!
  delivery_id: ID!
  recorded_at: String!
}

extend type Query {
  orderTracking(user_id: ID!, order_id: ID!): OrderTracking!
    @field(resolver: "App\\GraphQL\\Queries\\TrackingQueries@orderTracking")
  deliveryTracking(delivery_id: ID!): DeliveryTracking!
    @field(resolver: "App\\GraphQL\\Queries\\TrackingQueries@deliveryTracking")
  courierLastPosition(courier_id: ID!): CourierPosition
    @field(resolver: "App\\GraphQL\\Queries\\TrackingQueries@courierLastPosition")
}

extend type Mutation {
  updateCourierLocation(input: UpdateCourierLocationInput!): UpdateCourierLocationPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\TrackingMutations@updateCourierLocation")
}
