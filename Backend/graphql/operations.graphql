enum CourierStatusInput {
  AVAILABLE
  BUSY
  OFFLINE
}

input ToggleCourierAvailabilityInput {
  status: CourierStatusInput!
}

type ToggleCourierAvailabilityPayload {
  ok: Boolean!
  courier_id: ID!
  status: String!
}

input AcceptDeliveryJobInput {
  delivery_id: ID!
  offer_token: String!
}

type AcceptDeliveryJobPayload {
  ok: Boolean!
  delivery_id: ID!
  order_id: ID!
  courier_id: ID!
  delivery_status: String!
}

input RestaurantOrderActionInput {
  order_id: ID!
  reason: String
}

type RestaurantOrderActionPayload {
  ok: Boolean!
  order_id: ID!
  status: String!
}

type RestaurantActiveOrder {
  order_id: ID!
  restaurant_id: ID!
  customer_id: ID!
  customer_name: String
  order_status: String!
  total: Float!
  delivery_address: String
  created_at: String
  delivery_id: ID
  delivery_status: String
  courier_id: ID
  items: [RestaurantActiveOrderItem!]!
}

type RestaurantActiveOrderItem {
  order_item_id: ID!
  name: String!
  quantity: Int!
  status: String!
  total_price: Float!
}

input CreateRestaurantMenuProductInput {
  restaurant_id: ID
  category: String!
  name: String!
  description: String
  price: Float!
  estimated_preparation_time_min: Int
  is_available: Boolean = true
}

input UpdateRestaurantMenuProductInput {
  restaurant_product_id: ID!
  price: Float
  estimated_preparation_time_min: Int
  is_available: Boolean
}

input DeleteRestaurantMenuProductInput {
  restaurant_product_id: ID!
}

type RestaurantMenuProductActionPayload {
  ok: Boolean!
  restaurant_product_id: ID
  product_id: ID
  restaurant_id: ID
  message: String
}

type CourierDeliveryOffer {
  delivery_id: ID!
  order_id: ID!
  order_status: String!
  restaurant_name: String!
  order_total: Float!
  estimated_pickup_distance_km: Float
  estimated_pickup_time_min: Int
  pickup_address: String
  dropoff_address: String
  offer_token: String!
  offer_expires_at: String!
  created_at: String
}

extend type Query {
  restaurantActiveOrders(restaurant_id: ID): [RestaurantActiveOrder!]!
    @field(resolver: "App\\GraphQL\\Queries\\OperationsQueries@restaurantActiveOrders")

  courierAvailableDeliveries(limit: Int = 20): [CourierDeliveryOffer!]!
    @field(resolver: "App\\GraphQL\\Queries\\OperationsQueries@courierAvailableDeliveries")
}

extend type Mutation {
  toggleCourierAvailability(input: ToggleCourierAvailabilityInput!): ToggleCourierAvailabilityPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\ToggleCourierAvailability")

  acceptDeliveryJob(input: AcceptDeliveryJobInput!): AcceptDeliveryJobPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\AcceptDeliveryJob")

  acceptRestaurantOrder(input: RestaurantOrderActionInput!): RestaurantOrderActionPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\AcceptRestaurantOrder")

  rejectRestaurantOrder(input: RestaurantOrderActionInput!): RestaurantOrderActionPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\RejectRestaurantOrder")

  createRestaurantMenuProduct(input: CreateRestaurantMenuProductInput!): RestaurantMenuProductActionPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMenuMutations@create")

  updateRestaurantMenuProduct(input: UpdateRestaurantMenuProductInput!): RestaurantMenuProductActionPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMenuMutations@update")

  deleteRestaurantMenuProduct(input: DeleteRestaurantMenuProductInput!): RestaurantMenuProductActionPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMenuMutations@delete")
}
