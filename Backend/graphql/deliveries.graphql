extend type Query {
  countAvailableCouriers: Int!
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@countAvailableCouriers")
  getCourierByUserId(user_id: ID!): Courier
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getCourierByUserId")
  getActiveDeliveryByCourierId(courier_id: ID!): Delivery
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getActiveDeliveryByCourierId")
  getDeliveriesByCourierId(courier_id: ID!, statuses: [DeliveryStatus!]): [Delivery!]!
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getDeliveriesByCourierId")
  getDeliveryById(id: ID!): Delivery
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getDeliveryById")
  getDeliveryByOrderId(order_id: ID!): Delivery
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getDeliveryByOrderId")
  getDeliveryOffersByCourierId(courier_id: ID!): [DeliveryOffer!]!
    @field(resolver: "App\\GraphQL\\Queries\\DeliveryQueries@getDeliveryOffersByCourierId")
}

extend type Mutation {
  updateCourierStatus(user_id: ID!, status: CourierStatus!): Courier!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@updateCourierStatus")
  acceptDeliveryOffer(offer_id: ID!): Delivery!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@acceptDeliveryOffer")
  rejectDeliveryOffer(offer_id: ID!, reason: String): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@rejectDeliveryOffer")
  markDeliveryPickedUp(delivery_id: ID!, courier_id: ID!): Delivery!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@markDeliveryPickedUp")
  markDeliveryInTransit(delivery_id: ID!, courier_id: ID!): Delivery!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@markDeliveryInTransit")
  markDeliveryDelivered(delivery_id: ID!, courier_id: ID!): Delivery!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@markDeliveryDelivered")
  markDeliveryFailed(delivery_id: ID!, courier_id: ID!, reason: String!): Delivery!
    @field(resolver: "App\\GraphQL\\Mutations\\DeliveryMutations@markDeliveryFailed")
}
