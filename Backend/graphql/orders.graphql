input CheckoutInput {
  user_id: ID!
  cart_id: ID
  address_id: ID
  payment_method: PaymentMethod!
  coupon_code: String
}

type CheckoutPayload {
  order: Order!
  payment: Payment
}

input RestaurantOrderDecisionInput {
  actor_user_id: ID!
  order_id: ID!
  reason: String
}

input UpdateOrderItemStatusInput {
  actor_user_id: ID!
  order_item_id: ID!
  status: OrderItemStatus!
}

extend type Query {
  getClientOrders(user_id: ID!, statuses: [OrderStatus!], page: Int = 1, per_page: Int = 20): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getClientOrders")
  getClientOrder(user_id: ID!, order_id: ID!): Order
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getClientOrder")
  getRestaurantOrders(restaurant_id: ID!, statuses: [OrderStatus!], page: Int = 1, per_page: Int = 20): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getRestaurantOrders")
  getActiveRestaurantOrders(restaurant_id: ID!): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getActiveRestaurantOrders")
  getRestaurantOrder(restaurant_id: ID!, order_id: ID!): Order
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getRestaurantOrder")
  getOrderEvents(order_id: ID!): [OrderEvent!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@getOrderEvents")
}

extend type Mutation {
  checkoutOrder(input: CheckoutInput!): CheckoutPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@checkoutOrder")
  cancelOrderByClient(user_id: ID!, order_id: ID!, reason: String): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@cancelOrderByClient")
  acceptOrderByRestaurant(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@acceptOrderByRestaurant")
  rejectOrderByRestaurant(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@rejectOrderByRestaurant")
  startPreparingOrder(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@startPreparingOrder")
  updateOrderItemStatus(input: UpdateOrderItemStatusInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@updateOrderItemStatus")
  markOrderReady(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@markOrderReady")
  repeatClientOrder(user_id: ID!, order_id: ID!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@repeatClientOrder")
}
