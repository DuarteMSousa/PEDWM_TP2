input CheckoutInput {
  user_id: ID!
  cart_id: ID
  address_id: ID
  payment_method: PaymentMethod!
  coupon_code: String
}

type CheckoutPayload {
  order: Order!
  payment: Payment
}

input RestaurantOrderDecisionInput {
  actor_user_id: ID!
  order_id: ID!
  reason: String
}

input UpdateOrderItemStatusInput {
  actor_user_id: ID!
  order_item_id: ID!
  status: OrderItemStatus!
}

extend type Query {
  clientOrders(user_id: ID!, statuses: [OrderStatus!], page: Int = 1, per_page: Int = 20): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@clientOrders")
  clientOrder(user_id: ID!, order_id: ID!): Order
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@clientOrder")
  restaurantOrders(restaurant_id: ID!, statuses: [OrderStatus!], page: Int = 1, per_page: Int = 20): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@restaurantOrders")
  restaurantActiveOrders(restaurant_id: ID!): [Order!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@restaurantActiveOrders")
  restaurantOrder(restaurant_id: ID!, order_id: ID!): Order
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@restaurantOrder")
  orderEvents(order_id: ID!): [OrderEvent!]!
    @field(resolver: "App\\GraphQL\\Queries\\OrderQueries@orderEvents")
}

extend type Mutation {
  checkout(input: CheckoutInput!): CheckoutPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@checkout")
  cancelClientOrder(user_id: ID!, order_id: ID!, reason: String): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@cancelClientOrder")
  acceptRestaurantOrder(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@acceptRestaurantOrder")
  rejectRestaurantOrder(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@rejectRestaurantOrder")
  startPreparingOrder(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@startPreparingOrder")
  updateOrderItemStatus(input: UpdateOrderItemStatusInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@updateOrderItemStatus")
  markOrderReady(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@markOrderReady")
  cancelRestaurantOrder(input: RestaurantOrderDecisionInput!): Order!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@cancelRestaurantOrder")
  repeatClientOrder(user_id: ID!, order_id: ID!): Cart!
    @field(resolver: "App\\GraphQL\\Mutations\\OrderMutations@repeatClientOrder")
}
