input CreatePromotionInput {
  chain_id: ID!
  name: String!
  description: String
  type: DiscountType!
  target: DiscountTarget!
  discount: Float!
  start_date: String
  end_date: String
  items: [PromotionItemInput!] = []
}

input UpdatePromotionInput {
  name: String
  description: String
  type: DiscountType
  target: DiscountTarget
  discount: Float
  start_date: String
  end_date: String
  items: [PromotionItemInput!]
}

input PromotionItemInput {
  id: ID
  item_id: ID!
}

input CreateCouponInput {
  chain_id: ID!
  code: String!
  description: String
  type: DiscountType!
  target: DiscountTarget!
  discount: Float!
  expiry_date: String
  items: [PromotionItemInput!] = []
}

input UpdateCouponInput {
  code: String
  description: String
  type: DiscountType
  target: DiscountTarget
  discount: Float
  expiry_date: String
  items: [PromotionItemInput!]
}

extend type Query {
  getPromotionsByChainId(chain_id: ID!): [Promotion!]!
    @field(resolver: "App\\GraphQL\\Queries\\CampaignQueries@getPromotionsByChainId")
  getPromotionById(id: ID!): Promotion
    @field(resolver: "App\\GraphQL\\Queries\\CampaignQueries@getPromotionById")
  getCouponsByChainId(chain_id: ID!): [Coupon!]!
    @field(resolver: "App\\GraphQL\\Queries\\CampaignQueries@getCouponsByChainId")
  getCouponById(id: ID!): Coupon
    @field(resolver: "App\\GraphQL\\Queries\\CampaignQueries@getCouponById")
  getCouponByCode(code: String!): Coupon
    @field(resolver: "App\\GraphQL\\Queries\\CampaignQueries@getCouponByCode")
}

extend type Mutation {
  createPromotion(actor_user_id: ID!, input: CreatePromotionInput!): Promotion!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@createPromotion")
  updatePromotion(actor_user_id: ID!, id: ID!, input: UpdatePromotionInput!): Promotion!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@updatePromotion")
  deletePromotion(actor_user_id: ID!, id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@deletePromotion")

  createCoupon(input: CreateCouponInput!): Coupon!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@createCoupon")
  updateCoupon(id: ID!, input: UpdateCouponInput!): Coupon!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@updateCoupon")
  deleteCoupon(id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\CampaignMutations@deleteCoupon")
}
