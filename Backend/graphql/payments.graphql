extend type Query {
  payment(id: ID!): Payment
    @field(resolver: "App\\GraphQL\\Queries\\PaymentQueries@payment")
  orderPayment(order_id: ID!): Payment
    @field(resolver: "App\\GraphQL\\Queries\\PaymentQueries@orderPayment")
  paymentEvents(payment_id: ID!): [PaymentEvent!]!
    @field(resolver: "App\\GraphQL\\Queries\\PaymentQueries@paymentEvents")
}

extend type Mutation {
  confirmPayment(payment_id: ID!, transaction_id: String): Payment!
    @field(resolver: "App\\GraphQL\\Mutations\\PaymentMutations@confirmPayment")
  cancelPayment(payment_id: ID!, reason: String): Payment!
    @field(resolver: "App\\GraphQL\\Mutations\\PaymentMutations@cancelPayment")
  failPayment(payment_id: ID!, reason: String): Payment!
    @field(resolver: "App\\GraphQL\\Mutations\\PaymentMutations@failPayment")
}
