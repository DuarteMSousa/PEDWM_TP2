input CreateOrderChatInput {
  order_id: ID!
  type: ChatType!
  participant_user_ids: [ID!]!
}

input SendMessageInput {
  chat_id: ID!
  sender_user_id: ID!
  content: String!
}

extend type Query {
  getChatsByOrderId(order_id: ID!): [Chat!]!
    @field(resolver: "App\\GraphQL\\Queries\\ChatQueries@getChatsByOrderId")
  getChatById(id: ID!): Chat
    @field(resolver: "App\\GraphQL\\Queries\\ChatQueries@getChatById")
  getMessagesByChatId(chat_id: ID!, page: Int = 1, per_page: Int = 50): [Message!]!
    @field(resolver: "App\\GraphQL\\Queries\\ChatQueries@getMessagesByChatId")
  getParticipantsByChatId(chat_id: ID!): [ChatParticipant!]!
    @field(resolver: "App\\GraphQL\\Queries\\ChatQueries@getParticipantsByChatId")
}

extend type Mutation {
  createOrderChat(input: CreateOrderChatInput!): Chat!
    @field(resolver: "App\\GraphQL\\Mutations\\ChatMutations@createOrderChat")
  sendChatMessage(input: SendMessageInput!): Message!
    @field(resolver: "App\\GraphQL\\Mutations\\ChatMutations@sendChatMessage")
}
