input SearchRestaurantsInput {
  q: String = ""
  name: String = ""
  chainName: String = ""
  city: String = ""
  country: String = ""
  postalCode: String = ""
  pageNumber: Int = 1
  pageSize: Int = 20
}

input CreateRestaurantChainInput {
  name: String!
}

input UpdateRestaurantChainInput {
  name: String
}

input CreateRestaurantInput {
  chain_id: ID!
  name: String!
  opening_hours: String!
  closing_hours: String!
  delivery_radius: Float!
  street: String
  city: String
  postal_code: String
  country: String
  latitude: Float
  longitude: Float
}

input UpdateRestaurantInput {
  chain_id: ID
  name: String
  opening_hours: String
  closing_hours: String
  delivery_radius: Float
  street: String
  city: String
  postal_code: String
  country: String
  latitude: Float
  longitude: Float
}

extend type Query {
  searchRestaurants(input: SearchRestaurantsInput): [Restaurant!]!
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@searchRestaurants")
  getRestaurantById(id: ID!): Restaurant
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@getRestaurantById")
  getAllRestaurantChains: [RestaurantChain!]!
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@getAllRestaurantChains")
  getRestaurantChainById(id: ID!): RestaurantChain
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@getRestaurantChainById")
  getRestaurantsByChainId(chain_id: ID!): [Restaurant!]!
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@getRestaurantsByChainId")
  getRestaurantByLocalManagerUserId(user_id: ID!): Restaurant
    @field(resolver: "App\\GraphQL\\Queries\\RestaurantQueries@getRestaurantByLocalManagerUserId")
}

extend type Mutation {
  createRestaurantChain(input: CreateRestaurantChainInput!): RestaurantChain!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@createRestaurantChain")
  updateRestaurantChain(id: ID!, input: UpdateRestaurantChainInput!): RestaurantChain!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@updateRestaurantChain")
  deleteRestaurantChain(id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@deleteRestaurantChain")

  createRestaurant(input: CreateRestaurantInput!): Restaurant!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@createRestaurant")
  updateRestaurant(id: ID!, input: UpdateRestaurantInput!): Restaurant!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@updateRestaurant")
  deleteRestaurant(id: ID!): Boolean!
    @field(resolver: "App\\GraphQL\\Mutations\\RestaurantMutations@deleteRestaurant")
}
