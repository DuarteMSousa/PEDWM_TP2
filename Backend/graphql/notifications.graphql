type UserNotification {
  id: ID!
  type: String!
  title: String!
  message: String!
  sent_at: String
  read_at: String
}

input MarkNotificationReadInput {
  notification_id: ID!
}

type MarkNotificationReadPayload {
  ok: Boolean!
  notification_id: ID!
  read_at: String
}

type MarkAllNotificationsReadPayload {
  ok: Boolean!
  affected_count: Int!
}

input RegisterPushTokenInput {
  token: String!
  provider: String = "expo"
  platform: String
}

type RegisterPushTokenPayload {
  ok: Boolean!
  push_token_id: ID!
  is_active: Boolean!
}

input UnregisterPushTokenInput {
  token: String!
}

type UnregisterPushTokenPayload {
  ok: Boolean!
}

extend type Query {
  userNotifications(unread_only: Boolean = false, limit: Int = 50): [UserNotification!]!
    @field(resolver: "App\\GraphQL\\Queries\\NotificationQueries@userNotifications")
}

extend type Mutation {
  markNotificationRead(input: MarkNotificationReadInput!): MarkNotificationReadPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\MarkNotificationRead")

  markAllNotificationsRead: MarkAllNotificationsReadPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\MarkAllNotificationsRead")

  registerPushToken(input: RegisterPushTokenInput!): RegisterPushTokenPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\RegisterPushToken")

  unregisterPushToken(input: UnregisterPushTokenInput!): UnregisterPushTokenPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\UnregisterPushToken")
}
