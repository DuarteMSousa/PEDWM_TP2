type MarkNotificationReadPayload {
  ok: Boolean!
  notification_id: ID!
  read_at: String
}

type MarkAllNotificationsReadPayload {
  ok: Boolean!
  affected_count: Int!
}

input RegisterPushTokenInput {
  token: String!
  provider: String = "expo"
  platform: String
}

type RegisterPushTokenPayload {
  ok: Boolean!
  push_token_id: ID!
  is_active: Boolean!
}

input UnregisterPushTokenInput {
  token: String!
}

type UnregisterPushTokenPayload {
  ok: Boolean!
}

extend type Query {
  clientNotifications(user_id: ID!, unread_only: Boolean = false, limit: Int = 50): [UserNotification!]!
    @field(resolver: "App\\GraphQL\\Queries\\NotificationQueries@clientNotifications")
}

extend type Mutation {
  markNotificationRead(user_id: ID!, notification_id: ID!): MarkNotificationReadPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutations@markNotificationRead")

  markAllClientNotificationsRead(user_id: ID!): MarkAllNotificationsReadPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutations@markAllClientNotificationsRead")

  registerPushToken(user_id: ID!, input: RegisterPushTokenInput!): RegisterPushTokenPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutations@registerPushToken")

  unregisterPushToken(user_id: ID!, input: UnregisterPushTokenInput!): UnregisterPushTokenPayload!
    @field(resolver: "App\\GraphQL\\Mutations\\NotificationMutations@unregisterPushToken")
}
