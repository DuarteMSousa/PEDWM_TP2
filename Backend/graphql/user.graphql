input CreateUserInput {
    name: String!
    email: String!
    password: String!
    user_type: UserType! = CUSTOMER
    chain_id: ID
    restaurant_id: ID
}

input UpdateUserInput {
    name: String
    email: String
}

input CreateUserAddressInput {
    street: String!
    city: String!
    postal_code: String!
    country: String!
    latitude: Float!
    longitude: Float!
    is_default: Boolean = false
    label: String
}

input UpdateUserAddressInput {
    street: String
    city: String
    postal_code: String
    country: String
    latitude: Float
    longitude: Float
    is_default: Boolean
    label: String
}

extend type Query {
    user(id: ID!): User @field(resolver: "App\\GraphQL\\Queries\\UserQueries@getUserById")
    clientAddresses(user_id: ID!): [UserAddress!]! @field(resolver: "App\\GraphQL\\Queries\\UserQueries@clientAddresses")
}

extend type Mutation {
    loginUser(email: String!, password: String!): User!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@login")

    createUser(input: CreateUserInput!): User! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@create")

    updateUser(id: ID!, input: UpdateUserInput!): User! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@update")

    deleteUser(id: ID!): Boolean! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@delete")

    createClientAddress(user_id: ID!, input: CreateUserAddressInput!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@createClientAddress")

    updateClientAddress(user_id: ID!, address_id: ID!, input: UpdateUserAddressInput!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@updateClientAddress")

    deleteClientAddress(user_id: ID!, address_id: ID!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@deleteClientAddress")

    setDefaultClientAddress(user_id: ID!, address_id: ID!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@setDefaultClientAddress")
}
