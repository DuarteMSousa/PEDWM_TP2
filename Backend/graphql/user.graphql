input CreateUserInput {
    name: String!
    email: String!
    password: String!
    user_type: UserType! = CUSTOMER
}

input UpdateUserInput {
    name: String
    email: String
}

input CreateUserAddressInput {
    street: String!
    city: String!
    postal_code: String!
    country: String!
    latitude: Float!
    longitude: Float!
    is_default: Boolean = false
    label: String
}

input UpdateUserAddressInput {
    street: String
    city: String
    postal_code: String
    country: String
    latitude: Float
    longitude: Float
    is_default: Boolean
    label: String
}

extend type Query {
    getUserById(id: ID!): User @field(resolver: "App\\GraphQL\\Queries\\UserQueries@getUserById")
    getUserAddressesByUserId(user_id: ID!): [UserAddress!]! @field(resolver: "App\\GraphQL\\Queries\\UserQueries@getUserAddressesByUserId")
}

extend type Mutation {
    authenticateByCredentials(email: String!, password: String!): User!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@authenticateByCredentials")

    createUser(input: CreateUserInput!): User! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@createUser")

    updateUser(id: ID!, input: UpdateUserInput!): User! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@updateUser")

    deleteUser(id: ID!): Boolean! 
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@deleteUser")

    createUserAddress(user_id: ID!, input: CreateUserAddressInput!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@createUserAddress")

    updateUserAddress(user_id: ID!, address_id: ID!, input: UpdateUserAddressInput!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@updateUserAddress")

    deleteUserAddress(user_id: ID!, address_id: ID!): Boolean!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@deleteUserAddress")

    setDefaultUserAddress(user_id: ID!, address_id: ID!): UserAddress!
        @field(resolver: "App\\GraphQL\\Mutations\\UserMutations@setDefaultUserAddress")
}
