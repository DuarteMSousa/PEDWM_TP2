"A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`."
scalar DateTime @scalar(class: "Nuwave\\Lighthouse\\Schema\\Types\\Scalars\\DateTime")

enum UserType {
    CUSTOMER @enum(value: "customer")
    COURIER @enum(value: "courier")
    CHAIN_MANAGER @enum(value: "chain_manager")
    LOCAL_MANAGER @enum(value: "local_manager")
}

enum CourierStatus {
    AVAILABLE @enum(value: "available")
    BUSY @enum(value: "busy")
    OFFLINE @enum(value: "offline")
}

"Indicates what fields are available at the top level of a query operation."
type Query {
    "Find a single user by an identifying attribute."
    user(
      "Search by primary key."
      id: ID @eq @rules(apply: ["prohibits:email", "required_without:email"])

      "Search by email address."
      email: String @eq @rules(apply: ["prohibits:id", "required_without:id", "email"])
    ): User @find

    "List multiple users."
    users(
      "Filters by name. Accepts SQL LIKE wildcards `%` and `_`."
      name: String @where(operator: "like")

      "Filters by user type."
      user_type: UserType @eq
    ): [User!]! @paginate(defaultCount: 10)

    "Find a single courier by user ID."
    courier(user_id: ID! @eq): Courier @find

    "List couriers."
    couriers(
      status: CourierStatus @eq
    ): [Courier!]! @paginate(defaultCount: 10)
}

type Mutation {
    "Create a new user."
    createUser(input: CreateUserInput! @spread): User! @create

    "Update an existing user."
    updateUser(id: ID!, input: UpdateUserInput! @spread): User! @update

    "Delete a user."
    deleteUser(id: ID! @whereKey): User! @delete

    "Create a courier profile for an existing user."
    createCourier(input: CreateCourierInput! @spread): Courier! @create

    "Update a courier profile."
    updateCourier(user_id: ID! @whereKey, input: UpdateCourierInput! @spread): Courier! @update

    "Create a chain manager profile."
    createChainManager(input: CreateChainManagerInput! @spread): ChainManager! @create

    "Create a local manager profile."
    createLocalManager(input: CreateLocalManagerInput! @spread): LocalManager! @create

    "Update courier location and broadcast tracking event."
    updateCourierLocation(input: UpdateCourierLocationInput!): UpdateCourierLocationPayload!
        @field(resolver: "App\\GraphQL\\Mutations\\UpdateCourierLocation")

    "Send a chat message and broadcast to chat topic."
    sendChatMessage(input: SendChatMessageInput!): SendChatMessagePayload!
        @field(resolver: "App\\GraphQL\\Mutations\\SendChatMessage")

    "Create and broadcast user notification to notifications topic."
    publishUserNotification(input: PublishUserNotificationInput!): PublishUserNotificationPayload!
        @field(resolver: "App\\GraphQL\\Mutations\\PublishUserNotification")
}

input CreateUserInput {
    name: String! @rules(apply: ["required", "string", "max:255"])
    email: String! @rules(apply: ["required", "email", "unique:users,email"])
    password: String! @rules(apply: ["required", "string", "min:8"])
    user_type: UserType! @rules(apply: ["required"])
}

input UpdateUserInput {
    name: String @rules(apply: ["string", "max:255"])
    email: String @rules(apply: ["email", "unique:users,email"])
    password: String @rules(apply: ["string", "min:8"])
}

input CreateCourierInput {
    user_id: ID! @rules(apply: ["required", "exists:users,id"])
    status: CourierStatus
}

input UpdateCourierInput {
    status: CourierStatus
}

input CreateChainManagerInput {
    user_id: ID! @rules(apply: ["required", "exists:users,id"])
    chain_id: ID
}

input CreateLocalManagerInput {
    user_id: ID! @rules(apply: ["required", "exists:users,id"])
    restaurant_id: ID
}

input UpdateCourierLocationInput {
    delivery_id: ID! @rules(apply: ["required", "exists:deliveries,id"])
    lat: Float! @rules(apply: ["required", "numeric", "between:-90,90"])
    lng: Float! @rules(apply: ["required", "numeric", "between:-180,180"])
    heading: Float @rules(apply: ["nullable", "numeric", "between:0,360"])
    speed: Float @rules(apply: ["nullable", "numeric", "min:0"])
    accuracy: Float @rules(apply: ["nullable", "numeric", "min:0"])
    recorded_at: DateTime
}

type UpdateCourierLocationPayload {
    ok: Boolean!
    delivery_id: ID!
    order_id: ID!
    recorded_at: DateTime!
}

input SendChatMessageInput {
    chat_id: ID! @rules(apply: ["required", "exists:chats,id"])
    content: String! @rules(apply: ["required", "string", "min:1", "max:2000"])
}

type SendChatMessagePayload {
    ok: Boolean!
    chat_id: ID!
    message_id: ID!
    sent_at: DateTime!
}

input PublishUserNotificationInput {
    user_id: ID! @rules(apply: ["required", "exists:users,id"])
    type: String! @rules(apply: ["required", "string", "max:100"])
    title: String! @rules(apply: ["required", "string", "max:255"])
    message: String! @rules(apply: ["required", "string", "max:2000"])
}

type PublishUserNotificationPayload {
    ok: Boolean!
    notification_id: ID!
    sent_at: DateTime!
}

"Account of a person who uses this application."
type User {
    "Unique primary key."
    id: ID!

    "Non-unique name."
    name: String!

    "Unique email address."
    email: String!

    "User type."
    user_type: UserType!

    "When the email was verified."
    email_verified_at: DateTime

    "When the account was created."
    created_at: DateTime!

    "When the account was last updated."
    updated_at: DateTime!

    "Courier profile (if user is a courier)."
    courier: Courier @hasOne

    "Chain manager profile (if user is a chain manager)."
    chainManager: ChainManager @hasOne

    "Local manager profile (if user is a local manager)."
    localManager: LocalManager @hasOne
}

"Courier profile with delivery-specific data."
type Courier {
    "User ID (primary key)."
    user_id: ID!

    "Current availability status."
    status: CourierStatus!

    "Last known latitude."
    current_latitude: Float

    "Last known longitude."
    current_longitude: Float

    "When location was last updated."
    last_location_update: DateTime

    "Sum of all ratings received."
    rating_sum: Float!

    "Number of ratings received."
    rating_count: Int!

    "When the record was created."
    created_at: DateTime!

    "When the record was last updated."
    updated_at: DateTime!

    "The user this courier profile belongs to."
    user: User! @belongsTo
}

"Chain manager profile."
type ChainManager {
    "User ID (primary key)."
    user_id: ID!

    "Restaurant chain ID."
    chain_id: ID

    "When the record was created."
    created_at: DateTime!

    "When the record was last updated."
    updated_at: DateTime!

    "The user this profile belongs to."
    user: User! @belongsTo
}

"Local manager profile."
type LocalManager {
    "User ID (primary key)."
    user_id: ID!

    "Restaurant ID."
    restaurant_id: ID

    "When the record was created."
    created_at: DateTime!

    "When the record was last updated."
    updated_at: DateTime!

    "The user this profile belongs to."
    user: User! @belongsTo
}
